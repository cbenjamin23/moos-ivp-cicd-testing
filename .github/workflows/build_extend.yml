            echo "P01 performance harness run failed before clean completion."
            exit 1
          fi
          if [ "${{ steps.p01_performance_results.outcome }}" != "success" ]; then
            echo "P01 performance harness results were incomplete or contained failed cases."
            exit 1
          fi

  p03-colregs-performance:
