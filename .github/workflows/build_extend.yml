name: Build And Check Active Harnesses
on:
  workflow_dispatch:
    inputs:
      dispatch_mode:
        description: "[Harness] mode: none, family_run, batch_family_run, or specific_harnesses"
        required: true
        type: choice
        default: none
        options:
          - none
          - family_run
          - batch_family_run
          - specific_harnesses
      family:
        description: "[Harness] family for family_run"
        required: false
        type: choice
        default: colregs
        options:
          - cmgr
          - obmgr
          - pid
          - colregs
          - collision_behavior
          - convoy_behavior
          - cutrange_behavior
          - fixedturn_behavior
          - loiter_behavior
          - obstacle_behavior
          - opregion
          - performance
          - shadow_behavior
          - stationkeep_behavior
          - trail_behavior
          - waypoint_behavior
      targets:
        description: "[Harness] comma-separated target keys for specific_harnesses mode"
        required: false
        default: "colregs_h01,colregs_h03"
      families:
        description: "[Harness] comma-separated families for batch_family_run mode"
        required: false
        default: "convoy_behavior,cutrange_behavior,fixedturn_behavior,loiter_behavior,shadow_behavior,stationkeep_behavior,trail_behavior,waypoint_behavior,collision_behavior,obstacle_behavior,opregion"
      cpp_test_mode:
        description: "[CTest] C++ test mode: none, family_run, or batch_family_run"
        required: true
        type: choice
        default: family_run
        options:
          - none
          - family_run
          - batch_family_run
      cpp_test_family:
        description: "[CTest] C++ test family for family_run"
        required: false
        type: choice
        default: geometry
        options:
          - apputil
          - behaviors
          - behaviors_colregs
          - behaviors_marine
          - bhvutil
          - contacts
          - dep_behaviors
          - encounters
          - evalutil
          - genutil
          - geodaid
          - geometry
          - helmivp
          - ipfview
          - ivpbuild
          - ivpcore
          - ivpsolve
          - logic
          - logutils
          - manifest
          - marine_pid
          - marineview
          - mbutil
          - nspatch
          - nsplug
          - obstacles
          - polar
          - realm
          - survey
          - turngeo
          - ucommand
          - ufield
          - zaicview
      cpp_test_families:
        description: "[CTest] comma-separated C++ families for batch_family_run mode"
        required: false
        default: "geometry,ivpbuild,mbutil"
      time_warp:
        description: "[Run settings] time warp for manual runs without a harness-specific CI profile"
        required: false
        default: "10"
      moos_ivp_ref:
        description: "[Run settings] MOOS-IvP branch, tag, or commit SHA to test"
        required: false
        default: "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.dispatch_mode }}-${{ inputs.dispatch_mode == 'family_run' && inputs.family || inputs.dispatch_mode == 'batch_family_run' && inputs.families || inputs.targets || 'none' }}-${{ inputs.cpp_test_mode }}-${{ inputs.cpp_test_mode == 'family_run' && inputs.cpp_test_family || inputs.cpp_test_mode == 'batch_family_run' && inputs.cpp_test_families || 'none' }}
  cancel-in-progress: true

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      harness_matrix: ${{ steps.harness_select.outputs.matrix }}
      runtime_matrix: ${{ steps.harness_select.outputs.runtime_matrix }}
      selected_keys: ${{ steps.harness_select.outputs.selected_keys }}
      cpp_matrix: ${{ steps.cpp_select.outputs.matrix }}
      selected_cpp_targets: ${{ steps.cpp_select.outputs.selected_targets }}
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint

      - name: Validate CI helper scripts
        run: |
          set -euo pipefail
          python3 -m unittest discover -s tests
          python3 scripts/check_repo_invariants.py

      - name: Select requested harness targets
        id: harness_select
        env:
          DISPATCH_MODE: ${{ inputs.dispatch_mode }}
          FAMILY: ${{ inputs.family }}
          FAMILIES: ${{ inputs.families }}
          TARGETS: ${{ inputs.targets }}
        run: |
          python3 scripts/harness_targets.py select \
            --mode "$DISPATCH_MODE" \
            --family "$FAMILY" \
            --families "$FAMILIES" \
            --targets "$TARGETS" \
            --github-output "$GITHUB_OUTPUT" \
            --github-summary "$GITHUB_STEP_SUMMARY"

      - name: Select requested CTest families
        id: cpp_select
        env:
          CPP_TEST_MODE: ${{ inputs.cpp_test_mode }}
          CPP_TEST_FAMILY: ${{ inputs.cpp_test_family }}
          CPP_TEST_FAMILIES: ${{ inputs.cpp_test_families }}
        run: |
          python3 scripts/ci_cpp_test_targets.py select \
            --mode "$CPP_TEST_MODE" \
            --family "$CPP_TEST_FAMILY" \
            --families "$CPP_TEST_FAMILIES" \
            --github-output "$GITHUB_OUTPUT" \
            --summary-path "$GITHUB_STEP_SUMMARY"

      - name: Require at least one selected workload
        env:
          HARNESS_KEYS: ${{ steps.harness_select.outputs.selected_keys }}
          CPP_TARGETS: ${{ steps.cpp_select.outputs.selected_targets }}
        run: |
          set -euo pipefail
          if [ -z "$HARNESS_KEYS" ] && [ -z "$CPP_TARGETS" ]; then
            echo "Select at least one harness target or one C++ test target."
            exit 1
          fi
          {
            echo "### Selected Workloads"
            echo ""
            echo "- Harness targets: \`${HARNESS_KEYS:-none}\`"
            echo "- CTest families: \`${CPP_TARGETS:-none}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      moos_ivp_sha: ${{ steps.moos_sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Clone MOOS-IvP
        env:
          MOOS_IVP_REF: ${{ inputs.moos_ivp_ref }}
        run: |
          set -euo pipefail
          git clone https://github.com/moos-ivp/moos-ivp.git
          git -C moos-ivp fetch --tags origin "$MOOS_IVP_REF" || true
          if git -C moos-ivp rev-parse --verify --quiet "$MOOS_IVP_REF^{commit}" >/dev/null; then
            git -C moos-ivp checkout --detach "$MOOS_IVP_REF"
          elif git -C moos-ivp rev-parse --verify --quiet "origin/$MOOS_IVP_REF^{commit}" >/dev/null; then
            git -C moos-ivp checkout --detach "origin/$MOOS_IVP_REF"
          else
            echo "Unable to resolve MOOS-IvP ref: $MOOS_IVP_REF" >&2
            exit 1
          fi

      - name: Capture MOOS-IvP SHA
        id: moos_sha
        env:
          MOOS_IVP_REF: ${{ inputs.moos_ivp_ref }}
        run: |
          set -euo pipefail
          sha=$(git -C moos-ivp rev-parse HEAD)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          {
            echo "### MOOS-IvP Under Test"
            echo ""
            echo "- Repository: \`https://github.com/moos-ivp/moos-ivp.git\`"
            echo "- Requested ref: \`$MOOS_IVP_REF\`"
            echo "- Resolved SHA: \`$sha\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Restore build cache
        id: build_cache
        uses: actions/cache@v5
        with:
          path: |
            moos-ivp/build
            moos-ivp/build/MOOS/MOOSCore/lib
            moos-ivp/build/MOOS/MOOSGeodesy/lib
            moos-ivp/bin
            moos-ivp/lib
            build
            bin
            lib
          key: ${{ runner.os }}-moos-${{ steps.moos_sha.outputs.sha }}-repo-${{ hashFiles('build.sh', 'CMakeLists.txt', 'src/**', 'tests/cpp/**', '.github/workflows/build_extend.yml') }}
          restore-keys: |
            ${{ runner.os }}-moos-${{ steps.moos_sha.outputs.sha }}-
            ${{ runner.os }}-

      - name: Install compiler cache
        if: ${{ steps.build_cache.outputs.cache-hit != 'true' }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ccache

      - name: Restore compiler cache
        if: ${{ steps.build_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-moos-${{ steps.moos_sha.outputs.sha }}-repo-${{ hashFiles('build.sh', 'CMakeLists.txt', 'src/**', 'tests/cpp/**', '.github/workflows/build_extend.yml') }}
          restore-keys: |
            ${{ runner.os }}-ccache-moos-${{ steps.moos_sha.outputs.sha }}-
            ${{ runner.os }}-ccache-

      - name: Configure compiler cache
        if: ${{ steps.build_cache.outputs.cache-hit != 'true' }}
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          set -euo pipefail
          ccache -M 500M
          ccache -z

      - name: Build MOOS-IvP
        if: ${{ steps.build_cache.outputs.cache-hit != 'true' }}
        working-directory: moos-ivp
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_BASEDIR: ${{ github.workspace }}
          CCACHE_COMPILERCHECK: content
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          ./build-moos.sh --minrobot --release
          ./build-ivp.sh --nogui

      - name: Put MOOS-IvP tools on PATH
        run: |
          {
            echo "${GITHUB_WORKSPACE}/moos-ivp/bin"
            echo "${GITHUB_WORKSPACE}/moos-ivp/scripts"
            echo "${GITHUB_WORKSPACE}/bin"
          } >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSCore/lib:${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSGeodesy/lib:${GITHUB_WORKSPACE}/moos-ivp/lib:${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Build repo
        if: ${{ steps.build_cache.outputs.cache-hit != 'true' }}
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_BASEDIR: ${{ github.workspace }}
          CCACHE_COMPILERCHECK: content
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          mkdir -p build
          cd build
          cmake \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DMOOSIVP_SOURCE_TREE_BASE="${GITHUB_WORKSPACE}/moos-ivp" ..
          make

      - name: Report compiler cache stats
        if: ${{ always() && steps.build_cache.outputs.cache-hit != 'true' }}
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          {
            echo "### Compiler Cache"
            echo ""
            echo '```'
            ccache -s || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report exact build cache hit
        if: ${{ steps.build_cache.outputs.cache-hit == 'true' }}
        run: |
          {
            echo "### Build Cache"
            echo ""
            echo "Exact build cache hit. Skipped MOOS-IvP and repo rebuild steps."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate C++ test registry
        run: |
          python3 scripts/check_cpp_tests.py \
            --build-dir build \
            --moos-src moos-ivp/ivp/src

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: workspace-build
          path: |
            moos-ivp/build/MOOS/MOOSCore/lib
            moos-ivp/build/MOOS/MOOSGeodesy/lib
            moos-ivp/bin
            moos-ivp/scripts
            moos-ivp/lib
            build
            bin
            lib
          if-no-files-found: error

  cpp-unit-tests:
    name: ctest / ${{ matrix.target }}
    if: ${{ inputs.cpp_test_mode != 'none' }}
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.cpp_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace-build
          path: .

      - name: Restore executable bits
        run: |
          find "${GITHUB_WORKSPACE}/moos-ivp/bin" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/moos-ivp/scripts" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/bin" -type f -exec chmod 755 {} +

      - name: Put built tools on PATH
        run: |
          {
            echo "${GITHUB_WORKSPACE}/moos-ivp/bin"
            echo "${GITHUB_WORKSPACE}/moos-ivp/scripts"
            echo "${GITHUB_WORKSPACE}/bin"
          } >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSCore/lib:${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSGeodesy/lib:${GITHUB_WORKSPACE}/moos-ivp/lib:${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Run selected C++ unit tests
        run: |
          set -euo pipefail
          rm -rf build/cpp-unit-test-reports
          python3 scripts/ci_cpp_test_targets.py run \
            --build-dir build \
            --targets "${{ matrix.target }}" \
            --reports-dir build/cpp-unit-test-reports \
            --summary-path "$GITHUB_STEP_SUMMARY"

      - name: Upload selected C++ unit test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: build/cpp-unit-test-reports/*.xml
          if-no-files-found: warn

  runtime-harnesses:
    name: runtime / ${{ matrix.key }} / ${{ matrix.harness }}
    if: ${{ inputs.dispatch_mode == 'specific_harnesses' || inputs.dispatch_mode == 'family_run' || inputs.dispatch_mode == 'batch_family_run' }}
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.runtime_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace-build
          path: .

      - name: Restore executable bits
        run: |
          find "${GITHUB_WORKSPACE}/moos-ivp/bin" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/moos-ivp/scripts" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/bin" -type f -exec chmod 755 {} +

      - name: Put built tools on PATH
        run: |
          {
            echo "${GITHUB_WORKSPACE}/moos-ivp/bin"
            echo "${GITHUB_WORKSPACE}/moos-ivp/scripts"
            echo "${GITHUB_WORKSPACE}/bin"
          } >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSCore/lib:${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSGeodesy/lib:${GITHUB_WORKSPACE}/moos-ivp/lib:${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Summarize selected harness context
        env:
          MOOS_IVP_REF: ${{ inputs.moos_ivp_ref }}
          MOOS_IVP_SHA: ${{ needs.build.outputs.moos_ivp_sha }}
        run: |
          {
            echo "### Selected Harness"
            echo ""
            echo "- Target: \`${{ matrix.key }}\`"
            echo "- Harness: \`${{ matrix.harness }}\`"
            echo "- Path: \`${{ matrix.path }}\`"
            echo "- Requested MOOS-IvP ref: \`$MOOS_IVP_REF\`"
            echo "- Resolved MOOS-IvP SHA: \`$MOOS_IVP_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run selected runtime harness
        id: harness
        continue-on-error: true
        env:
          PERF_PROFILE: ${{ matrix.perf_profile }}
        run: |
          set -euo pipefail
          cd "${{ matrix.path }}"
          if [ -n "${PERF_PROFILE:-}" ]; then
            ./zlaunch.sh
          else
            ./zlaunch.sh "${{ inputs.time_warp }}"
          fi

      - name: Upload selected runtime results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}/results.txt
          if-no-files-found: warn

      - name: Summarize selected runtime results
        id: harness_results
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          expected_count=$(python3 scripts/ci_harness_case_count.py "${{ matrix.path }}/zlaunch.sh")
          python3 scripts/ci_harness_results_summary.py \
            --results "${{ matrix.path }}/results.txt" \
            --harness "${{ matrix.harness }}" \
            --expected-count "$expected_count" \
            --summary-path "$GITHUB_STEP_SUMMARY"

      - name: Enforce selected runtime success
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.harness.outcome }}" != "success" ]; then
            echo "Harness run failed before clean completion."
            exit 1
          fi
          if [ "${{ steps.harness_results.outcome }}" != "success" ]; then
            echo "Harness results were incomplete or contained failed cases."
            exit 1
          fi
