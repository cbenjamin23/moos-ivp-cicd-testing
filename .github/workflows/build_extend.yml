      - name: Restore executable bits
        run: |
          find "${GITHUB_WORKSPACE}/moos-ivp/bin" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/moos-ivp/scripts" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/bin" -type f -exec chmod 755 {} +

      - name: Put built tools on PATH
        run: |
          echo "${GITHUB_WORKSPACE}/moos-ivp/bin" >> "$GITHUB_PATH"
          echo "${GITHUB_WORKSPACE}/moos-ivp/scripts" >> "$GITHUB_PATH"
          echo "${GITHUB_WORKSPACE}/bin" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSCore/lib:${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSGeodesy/lib:${GITHUB_WORKSPACE}/moos-ivp/lib:${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Run P01 obstacle performance harness
        id: p01_performance_harness
        continue-on-error: true
        env:
          PERF_PROFILE: ci
        run: |
          set -euo pipefail
          (
            cd harnesses/performance_harnesses/P01-obstacle_gauntlet
            ./zlaunch.sh
          )

      - name: Upload P01 performance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: p01-obstacle-performance-results
          path: harnesses/performance_harnesses/P01-obstacle_gauntlet/results.txt
          if-no-files-found: warn

      - name: Summarize P01 performance results
        id: p01_performance_results
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          python3 scripts/ci_harness_results_summary.py \
            --results harnesses/performance_harnesses/P01-obstacle_gauntlet/results.txt \
            --harness "P01-obstacle_gauntlet" \
            --expected-count 3 \
            --summary-path "$GITHUB_STEP_SUMMARY"

      - name: Enforce P01 performance success
        if: always()
        run: |
          set -euo pipefail
