name: Build And Check Active Harnesses
on:
  workflow_dispatch:
    inputs:
      dispatch_mode:
        description: "full, family_run, correctness_subset, or just_make_subset"
        required: true
        type: choice
        default: full
        options:
          - full
          - family_run
          - correctness_subset
          - just_make_subset
      family:
        description: "Family for family_run"
        required: false
        type: choice
        default: colregs
        options:
          - cmgr
          - obmgr
          - colregs
          - collision_behavior
          - convoy_behavior
          - fixedturn_behavior
          - loiter_behavior
          - obstacle_behavior
          - opregion
          - performance
          - shadow_behavior
          - stationkeep_behavior
          - trail_behavior
          - waypoint_behavior
      targets:
        description: "Comma-separated target keys for correctness_subset or just_make_subset modes"
        required: false
        default: "colregs_h01,colregs_h03"
      time_warp:
        description: "Time warp for manual runs that do not use a harness-specific CI profile"
        required: false
        default: "10"
      moos_ivp_ref:
        description: "MOOS-IvP branch, tag, or commit SHA to test"
        required: false
        default: "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.dispatch_mode }}-${{ inputs.dispatch_mode == 'family_run' && inputs.family || inputs.targets || 'full' }}
  cancel-in-progress: true

jobs:

  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint

      - name: Validate CI helper scripts
        run: |
          set -euo pipefail
          python3 -m unittest discover -s tests
          python3 scripts/harness_targets.py validate

  select-targets:
    if: ${{ inputs.dispatch_mode != 'full' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
      selected_keys: ${{ steps.select.outputs.selected_keys }}
    steps:
      - uses: actions/checkout@v6

      - name: Select requested harness targets
        id: select
        env:
          DISPATCH_MODE: ${{ inputs.dispatch_mode }}
          FAMILY: ${{ inputs.family }}
          TARGETS: ${{ inputs.targets }}
        run: |
          python3 scripts/harness_targets.py select \
            --mode "$DISPATCH_MODE" \
            --family "$FAMILY" \
            --targets "$TARGETS" \
            --github-output "$GITHUB_OUTPUT" \
            --github-summary "$GITHUB_STEP_SUMMARY"

  build:
    needs: workflow-lint
    runs-on: ubuntu-latest
    outputs:
      moos_ivp_sha: ${{ steps.moos_sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Clone MOOS-IvP
        env:
          MOOS_IVP_REF: ${{ inputs.moos_ivp_ref }}
        run: |
          set -euo pipefail
          git clone https://github.com/moos-ivp/moos-ivp.git
          git -C moos-ivp fetch --tags origin "$MOOS_IVP_REF" || true
          if git -C moos-ivp rev-parse --verify --quiet "$MOOS_IVP_REF^{commit}" >/dev/null; then
            git -C moos-ivp checkout --detach "$MOOS_IVP_REF"
          elif git -C moos-ivp rev-parse --verify --quiet "origin/$MOOS_IVP_REF^{commit}" >/dev/null; then
            git -C moos-ivp checkout --detach "origin/$MOOS_IVP_REF"
          else
            echo "Unable to resolve MOOS-IvP ref: $MOOS_IVP_REF" >&2
            exit 1
          fi

      - name: Capture MOOS-IvP SHA
        id: moos_sha
        env:
          MOOS_IVP_REF: ${{ inputs.moos_ivp_ref }}
        run: |
          set -euo pipefail
          sha=$(git -C moos-ivp rev-parse HEAD)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          {
            echo "### MOOS-IvP Under Test"
            echo ""
            echo "- Repository: \`https://github.com/moos-ivp/moos-ivp.git\`"
            echo "- Requested ref: \`$MOOS_IVP_REF\`"
            echo "- Resolved SHA: \`$sha\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Restore build cache
        id: build_cache
        uses: actions/cache@v5
        with:
          path: |
            moos-ivp/build
            moos-ivp/build/MOOS/MOOSCore/lib
            moos-ivp/build/MOOS/MOOSGeodesy/lib
            moos-ivp/bin
            moos-ivp/lib
            build
            bin
            lib
          key: ${{ runner.os }}-moos-${{ steps.moos_sha.outputs.sha }}-repo-${{ hashFiles('build.sh', 'CMakeLists.txt', 'src/**', '.github/workflows/build_extend.yml') }}
          restore-keys: |
            ${{ runner.os }}-moos-${{ steps.moos_sha.outputs.sha }}-
            ${{ runner.os }}-

      - name: Install compiler cache
        if: ${{ steps.build_cache.outputs.cache-hit != 'true' }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ccache

      - name: Restore compiler cache
        if: ${{ steps.build_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-moos-${{ steps.moos_sha.outputs.sha }}-repo-${{ hashFiles('build.sh', 'CMakeLists.txt', 'src/**', '.github/workflows/build_extend.yml') }}
          restore-keys: |
            ${{ runner.os }}-ccache-moos-${{ steps.moos_sha.outputs.sha }}-
            ${{ runner.os }}-ccache-

      - name: Configure compiler cache
        if: ${{ steps.build_cache.outputs.cache-hit != 'true' }}
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          set -euo pipefail
          ccache -M 500M
          ccache -z

      - name: Build MOOS-IvP
        if: ${{ steps.build_cache.outputs.cache-hit != 'true' }}
        working-directory: moos-ivp
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_BASEDIR: ${{ github.workspace }}
          CCACHE_COMPILERCHECK: content
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          ./build-moos.sh --minrobot --release
          ./build-ivp.sh --nogui

      - name: Put MOOS-IvP tools on PATH
        run: |
          {
            echo "${GITHUB_WORKSPACE}/moos-ivp/bin"
            echo "${GITHUB_WORKSPACE}/moos-ivp/scripts"
            echo "${GITHUB_WORKSPACE}/bin"
          } >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSCore/lib:${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSGeodesy/lib:${GITHUB_WORKSPACE}/moos-ivp/lib:${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Build repo
        if: ${{ steps.build_cache.outputs.cache-hit != 'true' }}
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_BASEDIR: ${{ github.workspace }}
          CCACHE_COMPILERCHECK: content
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          mkdir -p build
          cd build
          cmake \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DMOOSIVP_SOURCE_TREE_BASE="${GITHUB_WORKSPACE}/moos-ivp" ..
          make

      - name: Report compiler cache stats
        if: ${{ always() && steps.build_cache.outputs.cache-hit != 'true' }}
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          {
            echo "### Compiler Cache"
            echo ""
            echo '```'
            ccache -s || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report exact build cache hit
        if: ${{ steps.build_cache.outputs.cache-hit == 'true' }}
        run: |
          {
            echo "### Build Cache"
            echo ""
            echo "Exact build cache hit. Skipped MOOS-IvP and repo rebuild steps."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: workspace-build
          path: |
            moos-ivp/build/MOOS/MOOSCore/lib
            moos-ivp/build/MOOS/MOOSGeodesy/lib
            moos-ivp/bin
            moos-ivp/scripts
            moos-ivp/lib
            build
            bin
            lib
          if-no-files-found: error

  just-make:
    name: just-make / ${{ matrix.harness }}
    if: ${{ inputs.dispatch_mode == 'full' }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        harness:
          - harnesses/cmgr_harnesses/H01-cmgr_unit
          - harnesses/cmgr_harnesses/H02-cmgr_motion
          - harnesses/obmgr_harnesses/H01-obmgr_unit
          - harnesses/obmgr_harnesses/H02-obmgr_motion
          - harnesses/colregs_harnesses/H01-colregs_classification
          - harnesses/colregs_harnesses/H03-colregs_execution
          - harnesses/collision_behavior_harnesses/H01-collision_behavior_motion
          - harnesses/obstacle_behavior_harnesses/H01-obstacle_behavior_motion
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace-build
          path: .

      - name: Restore executable bits
        run: |
          find "${GITHUB_WORKSPACE}/moos-ivp/bin" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/moos-ivp/scripts" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/bin" -type f -exec chmod 755 {} +

      - name: Put built tools on PATH
        run: |
          {
            echo "${GITHUB_WORKSPACE}/moos-ivp/bin"
            echo "${GITHUB_WORKSPACE}/moos-ivp/scripts"
            echo "${GITHUB_WORKSPACE}/bin"
          } >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSCore/lib:${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSGeodesy/lib:${GITHUB_WORKSPACE}/moos-ivp/lib:${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Just-make one active harness
        run: |
          set -euo pipefail
          cd "${{ matrix.harness }}"
          ./zlaunch.sh --just_make 10

  collision-correctness:
    if: ${{ inputs.dispatch_mode == 'full' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace-build
          path: .

      - name: Restore executable bits
        run: |
          find "${GITHUB_WORKSPACE}/moos-ivp/bin" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/moos-ivp/scripts" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/bin" -type f -exec chmod 755 {} +

      - name: Put built tools on PATH
        run: |
          {
            echo "${GITHUB_WORKSPACE}/moos-ivp/bin"
            echo "${GITHUB_WORKSPACE}/moos-ivp/scripts"
            echo "${GITHUB_WORKSPACE}/bin"
          } >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSCore/lib:${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSGeodesy/lib:${GITHUB_WORKSPACE}/moos-ivp/lib:${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Run full collision correctness harness
        id: collision_harness
        continue-on-error: true
        run: |
          set -euo pipefail
          (
            cd harnesses/collision_behavior_harnesses/H01-collision_behavior_motion
            ./zlaunch.sh 10
          )

      - name: Upload collision harness results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: collision-correctness-results
          path: harnesses/collision_behavior_harnesses/H01-collision_behavior_motion/results.txt
          if-no-files-found: warn

      - name: Summarize collision harness results
        id: collision_results
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          expected_count=$(python3 scripts/ci_harness_case_count.py harnesses/collision_behavior_harnesses/H01-collision_behavior_motion/zlaunch.sh)
          python3 scripts/ci_harness_results_summary.py \
            --results harnesses/collision_behavior_harnesses/H01-collision_behavior_motion/results.txt \
            --harness "H01-collision_behavior_motion" \
            --expected-count "$expected_count" \
            --summary-path "$GITHUB_STEP_SUMMARY"

      - name: Enforce collision harness success
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.collision_harness.outcome }}" != "success" ]; then
            echo "Collision harness run failed before clean completion."
            exit 1
          fi
          if [ "${{ steps.collision_results.outcome }}" != "success" ]; then
            echo "Collision harness results were incomplete or contained failed cases."
            exit 1
          fi

  colregs-classification-correctness:
    if: ${{ inputs.dispatch_mode == 'full' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace-build
          path: .

      - name: Restore executable bits
        run: |
          find "${GITHUB_WORKSPACE}/moos-ivp/bin" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/moos-ivp/scripts" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/bin" -type f -exec chmod 755 {} +

      - name: Put built tools on PATH
        run: |
          {
            echo "${GITHUB_WORKSPACE}/moos-ivp/bin"
            echo "${GITHUB_WORKSPACE}/moos-ivp/scripts"
            echo "${GITHUB_WORKSPACE}/bin"
          } >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSCore/lib:${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSGeodesy/lib:${GITHUB_WORKSPACE}/moos-ivp/lib:${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Run full COLREGS classification harness
        id: colregs_h01_harness
        continue-on-error: true
        run: |
          set -euo pipefail
          (
            cd harnesses/colregs_harnesses/H01-colregs_classification
            ./zlaunch.sh 10
          )

      - name: Upload COLREGS classification results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: colregs-classification-correctness-results
          path: harnesses/colregs_harnesses/H01-colregs_classification/results.txt
          if-no-files-found: warn

      - name: Summarize COLREGS classification results
        id: colregs_h01_results
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          expected_count=$(python3 scripts/ci_harness_case_count.py harnesses/colregs_harnesses/H01-colregs_classification/zlaunch.sh)
          python3 scripts/ci_harness_results_summary.py \
            --results harnesses/colregs_harnesses/H01-colregs_classification/results.txt \
            --harness "H01-colregs_classification" \
            --expected-count "$expected_count" \
            --summary-path "$GITHUB_STEP_SUMMARY"

      - name: Enforce COLREGS classification success
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.colregs_h01_harness.outcome }}" != "success" ]; then
            echo "COLREGS classification harness run failed before clean completion."
            exit 1
          fi
          if [ "${{ steps.colregs_h01_results.outcome }}" != "success" ]; then
            echo "COLREGS classification harness results were incomplete or contained failed cases."
            exit 1
          fi

  colregs-correctness:
    if: ${{ inputs.dispatch_mode == 'full' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace-build
          path: .

      - name: Restore executable bits
        run: |
          find "${GITHUB_WORKSPACE}/moos-ivp/bin" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/moos-ivp/scripts" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/bin" -type f -exec chmod 755 {} +

      - name: Put built tools on PATH
        run: |
          {
            echo "${GITHUB_WORKSPACE}/moos-ivp/bin"
            echo "${GITHUB_WORKSPACE}/moos-ivp/scripts"
            echo "${GITHUB_WORKSPACE}/bin"
          } >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSCore/lib:${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSGeodesy/lib:${GITHUB_WORKSPACE}/moos-ivp/lib:${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Run full COLREGS correctness harness
        id: colregs_harness
        continue-on-error: true
        run: |
          set -euo pipefail
          (
            cd harnesses/colregs_harnesses/H03-colregs_execution
            ./zlaunch.sh 10
          )

      - name: Upload COLREGS harness results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: colregs-correctness-results
          path: harnesses/colregs_harnesses/H03-colregs_execution/results.txt
          if-no-files-found: warn

      - name: Summarize COLREGS harness results
        id: colregs_results
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          expected_count=$(python3 scripts/ci_harness_case_count.py harnesses/colregs_harnesses/H03-colregs_execution/zlaunch.sh)
          python3 scripts/ci_harness_results_summary.py \
            --results harnesses/colregs_harnesses/H03-colregs_execution/results.txt \
            --harness "H03-colregs_execution" \
            --expected-count "$expected_count" \
            --summary-path "$GITHUB_STEP_SUMMARY"

      - name: Enforce COLREGS harness success
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.colregs_harness.outcome }}" != "success" ]; then
            echo "COLREGS harness run failed before clean completion."
            exit 1
          fi
          if [ "${{ steps.colregs_results.outcome }}" != "success" ]; then
            echo "COLREGS harness results were incomplete or contained failed cases."
            exit 1
          fi

  just-make-subset:
    name: just-make / ${{ matrix.key }} / ${{ matrix.harness }}
    if: ${{ inputs.dispatch_mode == 'just_make_subset' }}
    needs:
      - select-targets
      - build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select-targets.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace-build
          path: .

      - name: Restore executable bits
        run: |
          find "${GITHUB_WORKSPACE}/moos-ivp/bin" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/moos-ivp/scripts" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/bin" -type f -exec chmod 755 {} +

      - name: Put built tools on PATH
        run: |
          {
            echo "${GITHUB_WORKSPACE}/moos-ivp/bin"
            echo "${GITHUB_WORKSPACE}/moos-ivp/scripts"
            echo "${GITHUB_WORKSPACE}/bin"
          } >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSCore/lib:${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSGeodesy/lib:${GITHUB_WORKSPACE}/moos-ivp/lib:${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Summarize selected harness context
        env:
          MOOS_IVP_REF: ${{ inputs.moos_ivp_ref }}
          MOOS_IVP_SHA: ${{ needs.build.outputs.moos_ivp_sha }}
        run: |
          {
            echo "### Selected Harness"
            echo ""
            echo "- Target: \`${{ matrix.key }}\`"
            echo "- Harness: \`${{ matrix.harness }}\`"
            echo "- Path: \`${{ matrix.path }}\`"
            echo "- Requested MOOS-IvP ref: \`$MOOS_IVP_REF\`"
            echo "- Resolved MOOS-IvP SHA: \`$MOOS_IVP_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Just-make selected harness
        run: |
          set -euo pipefail
          cd "${{ matrix.path }}"
          ./zlaunch.sh --just_make "${{ inputs.time_warp }}"

  correctness-subset:
    name: correctness / ${{ matrix.key }} / ${{ matrix.harness }}
    if: ${{ inputs.dispatch_mode == 'correctness_subset' }}
    needs:
      - select-targets
      - build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select-targets.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace-build
          path: .

      - name: Restore executable bits
        run: |
          find "${GITHUB_WORKSPACE}/moos-ivp/bin" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/moos-ivp/scripts" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/bin" -type f -exec chmod 755 {} +

      - name: Put built tools on PATH
        run: |
          {
            echo "${GITHUB_WORKSPACE}/moos-ivp/bin"
            echo "${GITHUB_WORKSPACE}/moos-ivp/scripts"
            echo "${GITHUB_WORKSPACE}/bin"
          } >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSCore/lib:${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSGeodesy/lib:${GITHUB_WORKSPACE}/moos-ivp/lib:${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Summarize selected harness context
        env:
          MOOS_IVP_REF: ${{ inputs.moos_ivp_ref }}
          MOOS_IVP_SHA: ${{ needs.build.outputs.moos_ivp_sha }}
        run: |
          {
            echo "### Selected Harness"
            echo ""
            echo "- Target: \`${{ matrix.key }}\`"
            echo "- Harness: \`${{ matrix.harness }}\`"
            echo "- Path: \`${{ matrix.path }}\`"
            echo "- Requested MOOS-IvP ref: \`$MOOS_IVP_REF\`"
            echo "- Resolved MOOS-IvP SHA: \`$MOOS_IVP_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run selected correctness harness
        id: harness
        continue-on-error: true
        env:
          PERF_PROFILE: ${{ matrix.perf_profile }}
        run: |
          set -euo pipefail
          cd "${{ matrix.path }}"
          if [ -n "${PERF_PROFILE:-}" ]; then
            ./zlaunch.sh
          else
            ./zlaunch.sh "${{ inputs.time_warp }}"
          fi

      - name: Upload selected correctness results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}/results.txt
          if-no-files-found: warn

      - name: Summarize selected correctness results
        id: harness_results
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          expected_count=$(python3 scripts/ci_harness_case_count.py "${{ matrix.path }}/zlaunch.sh")
          python3 scripts/ci_harness_results_summary.py \
            --results "${{ matrix.path }}/results.txt" \
            --harness "${{ matrix.harness }}" \
            --expected-count "$expected_count" \
            --summary-path "$GITHUB_STEP_SUMMARY"

      - name: Enforce selected correctness success
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.harness.outcome }}" != "success" ]; then
            echo "Harness run failed before clean completion."
            exit 1
          fi
          if [ "${{ steps.harness_results.outcome }}" != "success" ]; then
            echo "Harness results were incomplete or contained failed cases."
            exit 1
          fi

  family-run:
    name: ${{ inputs.family }} / ${{ matrix.key }} / ${{ matrix.harness }}
    if: ${{ inputs.dispatch_mode == 'family_run' }}
    needs:
      - select-targets
      - build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select-targets.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: workspace-build
          path: .

      - name: Restore executable bits
        run: |
          find "${GITHUB_WORKSPACE}/moos-ivp/bin" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/moos-ivp/scripts" -type f -exec chmod 755 {} +
          find "${GITHUB_WORKSPACE}/bin" -type f -exec chmod 755 {} +

      - name: Put built tools on PATH
        run: |
          {
            echo "${GITHUB_WORKSPACE}/moos-ivp/bin"
            echo "${GITHUB_WORKSPACE}/moos-ivp/scripts"
            echo "${GITHUB_WORKSPACE}/bin"
          } >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSCore/lib:${GITHUB_WORKSPACE}/moos-ivp/build/MOOS/MOOSGeodesy/lib:${GITHUB_WORKSPACE}/moos-ivp/lib:${GITHUB_WORKSPACE}/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Summarize selected harness context
        env:
          MOOS_IVP_REF: ${{ inputs.moos_ivp_ref }}
          MOOS_IVP_SHA: ${{ needs.build.outputs.moos_ivp_sha }}
        run: |
          {
            echo "### Selected Harness"
            echo ""
            echo "- Target: \`${{ matrix.key }}\`"
            echo "- Harness: \`${{ matrix.harness }}\`"
            echo "- Path: \`${{ matrix.path }}\`"
            echo "- Requested MOOS-IvP ref: \`$MOOS_IVP_REF\`"
            echo "- Resolved MOOS-IvP SHA: \`$MOOS_IVP_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run selected family harness
        id: harness
        continue-on-error: true
        env:
          PERF_PROFILE: ${{ matrix.perf_profile }}
        run: |
          set -euo pipefail
          cd "${{ matrix.path }}"
          if [ -n "${PERF_PROFILE:-}" ]; then
            ./zlaunch.sh
          else
            ./zlaunch.sh "${{ inputs.time_warp }}"
          fi

      - name: Upload selected family results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}/results.txt
          if-no-files-found: warn

      - name: Summarize selected family results
        id: harness_results
        if: always()
        continue-on-error: true
        run: |
          set -euo pipefail
          expected_count=$(python3 scripts/ci_harness_case_count.py "${{ matrix.path }}/zlaunch.sh")
          python3 scripts/ci_harness_results_summary.py \
            --results "${{ matrix.path }}/results.txt" \
            --harness "${{ matrix.harness }}" \
            --expected-count "$expected_count" \
            --summary-path "$GITHUB_STEP_SUMMARY"

      - name: Enforce selected family success
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.harness.outcome }}" != "success" ]; then
            echo "Harness run failed before clean completion."
            exit 1
          fi
          if [ "${{ steps.harness_results.outcome }}" != "success" ]; then
            echo "Harness results were incomplete or contained failed cases."
            exit 1
          fi

