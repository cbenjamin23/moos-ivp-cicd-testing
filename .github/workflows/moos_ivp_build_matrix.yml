name: Build MOOS-IvP Portability Matrix

on:
  workflow_dispatch:
    inputs:
      moos_ivp_repo:
        description: "MOOS-IvP git repository URL to clone"
        required: false
        default: "https://github.com/moos-ivp/moos-ivp.git"
      moos_ivp_ref:
        description: "MOOS-IvP branch, tag, or commit SHA to build"
        required: false
        default: "main"
      build_profile:
        description: "MOOS-IvP build profile"
        required: true
        type: choice
        default: full
        options:
          - full
          - headless
      target_set:
        description: "Build target set"
        required: true
        type: choice
        default: modern
        options:
          - modern
          - current
          - compat
          - all
          - gcc
          - clang
          - ubuntu
          - debian
          - rocky
          - specific_targets
      targets:
        description: "Comma-separated target keys when target_set=specific_targets"
        required: false
        default: "ubuntu_2404_gcc"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.moos_ivp_repo }}-${{ inputs.moos_ivp_ref }}-${{ inputs.build_profile }}-${{ inputs.target_set }}-${{ inputs.target_set == 'specific_targets' && inputs.targets || '' }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
      selected_keys: ${{ steps.select.outputs.selected_keys }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate MOOS-IvP build target registry
        run: python3 scripts/moos_ivp_build_matrix.py validate

      - name: Select requested build targets
        id: select
        env:
          BUILD_PROFILE: ${{ inputs.build_profile }}
          TARGET_SET: ${{ inputs.target_set }}
          TARGETS: ${{ inputs.targets }}
        run: |
          python3 scripts/moos_ivp_build_matrix.py select \
            --target-set "$TARGET_SET" \
            --targets "$TARGETS" \
            --build-profile "$BUILD_PROFILE" \
            --github-output "$GITHUB_OUTPUT" \
            --summary-path "$GITHUB_STEP_SUMMARY"

  build:
    name: ${{ matrix.key }}
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Install checkout dependency
        run: |
          set -euo pipefail
          if command -v git >/dev/null 2>&1; then
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates git
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y ca-certificates git
          elif command -v yum >/dev/null 2>&1; then
            yum install -y ca-certificates git
          else
            echo "Unsupported package manager. Cannot install git for checkout." >&2
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Build MOOS-IvP
        env:
          MOOS_IVP_REPO: ${{ inputs.moos_ivp_repo }}
          MOOS_IVP_REF: ${{ inputs.moos_ivp_ref }}
          TARGET_KEY: ${{ matrix.key }}
          TARGET_COMPILER: ${{ matrix.compiler }}
          BUILD_PROFILE: ${{ inputs.build_profile }}
          WORK_DIR: ${{ github.workspace }}/_moos_ivp_build
          BUILD_LOG: ${{ github.workspace }}/_moos_ivp_build/build.log
        run: ./scripts/build_moos_ivp_target.sh

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: _moos_ivp_build/build.log
          retention-days: 7
          if-no-files-found: warn
